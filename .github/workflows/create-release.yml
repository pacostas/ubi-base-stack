name: Create Release
# Add a matrix for the node versions to check against
on:
  # schedule:
  # - cron: '*/30 * * * *'  # every 30 minutes
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: "Version of the release to cut (e.g. 1.2.3). No leading v"
        required: false
      force:
        description: "Release stack even if change validator does not detect changes, or a package is removed"
        required: true
        type: choice
        default: "false"
        options:
          - "true"
          - "false"

concurrency: release
env:
  UBI_BUILD_SHA256_FILENAME: build.oci.sha256
  UBI_RUN_SHA256_FILENAME: run.oci.sha256
  UBI_RUN_NODEJS_16_SHA256_FILENAME: run-nodejs-16.oci.sha256
  UBI_RUN_NODEJS_18_SHA256_FILENAME: run-nodejs-18.oci.sha256

jobs:
  poll_ubi_images:
    name: Poll UBI Images
    runs-on: ubuntu-22.04
    outputs:
      ubi_images_need_update: ${{ steps.compare_current_and_latest_sha256_hash_codes.outputs.ubi_images_need_update }}

    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0 # gets full history

      # - name: Fetch current run Node.js 16 sha256 image hash code
      #   id: fetch_current_run_nodejs_16_sha256_image_hash_code
      #   uses: paketo-buildpacks/github-config/actions/release/find-and-download-asset@main
      #   with:
      #     asset_pattern: "${{ env.UBI_RUN_NODEJS_16_SHA256_FILENAME }}"
      #     search_depth: 1
      #     repo: ${{ github.repository }}
      #     output_path: "/github/workspace/${{ env.UBI_RUN_NODEJS_16_SHA256_FILENAME }}"
      #     token: ${{ secrets.PAKETO_BOT_GITHUB_TOKEN }}

      - name: Compare current and latest sha256 hash codes
        id: compare_current_and_latest_sha256_hash_codes
        run: |

          echo "heeee"
          git rev-list --tags --max-count=1
          echo "ennnddd"

          ubi_images_need_update=()

          # Run Image Node.js 16
          # current_run_nodejs_16_sha256_image_hash_code=$(cat ${{ github.workspace }}/${{ env.UBI_RUN_NODEJS_16_SHA256_FILENAME }})

          # latest_run_nodejs_16_sha256_image_hash_code=$(docker image inspect registry.access.redhat.com/ubi8/nodejs-16-minimal --format '{{json .RepoDigests}}' | jq -r '.[0]')
          # for now we mock above command because it does not work
          latest_run_nodejs_16_sha256_image_hash_code="registry.access.redhat.com/ubi8/nodejs-16-minimal@sha256:696664e684b6eed053c6abe16f9432a815cb48a2ca9b31a14742e2b3feb3a237"

          if [ "$current_run_nodejs_16_sha256_image_hash_code" != "$latest_run_nodejs_16_sha256_image_hash_code" ]; then
            ubi_images_need_update+=("node-16-run")
          fi

          # ls ${{ github.workspace }}/${{ env.UBI_RUN_NODEJS_16_SHA256_FILENAME }}

          # echo "end of ls workspace"

          # docker pull registry.access.redhat.com/ubi8/nodejs-16-minimal
          # current_sha_node_16=$(docker image inspect registry.access.redhat.com/ubi8/nodejs-16-minimal --format '{{json .RepoDigests}}' | jq -r '.[0]')

          # current_sha_node_18=$(docker image inspect registry.access.redhat.com/ubi8/nodejs-18-minimal --format '{{json .RepoDigests}}' | jq -r '.[0]')
          # saved_sha_node_18=$(cat ./stack-nodejs-18/nodejs-18-sha256 | jq -r '.[0]')
          # if [ "$saved_sha_node_18" != "$current_sha_node_18" ]; then
          #   ubi_images_need_update+=("node-18-run")
          # fi

          # current_sha_run_image=$(docker image inspect registry.access.redhat.com/ubi8/ubi-minimal --format '{{json .RepoDigests}}' | jq -r '.[0]')
          # saved_sha_run_image=$(cat ./ubi-image-hash-codes/run-sha256 | jq -r '.[0]')
          # if [ "$saved_sha_run_image" != "$current_sha_run_image" ]; then
          #   ubi_images_need_update+=("run-image")
          # fi

          # current_sha_build_image=$(docker image inspect registry.access.redhat.com/ubi8/ubi-minimal --format '{{json .RepoDigests}}' | jq -r '.[0]')
          # saved_sha_build_image=$(cat ./ubi-image-hash-codes/build-sha256 | jq -r '.[0]')
          # if [ "$saved_sha_build_image" != "$current_sha_build_image" ]; then
          #   ubi_images_need_update+=("build-image")
          # fi

          echo ${ubi_images_need_update[@]}
          # echo ${ubi_images_need_update[@]} >> $GITHUB_OUTPUT

  create_stack:
    name: Create Stack
    needs: poll_ubi_images
    if: ${{ ! ( needs.poll_ubi_images.outputs.ubi_images_need_update == '[]' && github.event_name == 'schedule' ) }}

    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Create stack
        id: create-stack
        uses: paketo-buildpacks/github-config/actions/stack/create-stack@main

      - name: Upload nodejs 16 run image
        uses: actions/upload-artifact@v3
        with:
          name: current-nodejs-16-run-image
          path: ./build-nodejs-16/run.oci

      - name: Get nodejs 16 run image hash code
        run: |
          mkdir -p hash-codes/build-nodejs-16
          # for now we hardcode it because I dont know how to fetch it
          latest_run_nodejs_16_sha256_image_hash_code="registry.access.redhat.com/ubi8/nodejs-16-minimal@sha256:696664e684b6eed053c6abe16f9432a815cb48a2ca9b31a14742e2b3feb3a237"
          echo $latest_run_nodejs_16_sha256_image_hash_code > hash-codes/build-nodejs-16/run.oci.sha256

      - name: Upload nodejs 16 run image hash code
        uses: actions/upload-artifact@v3
        with:
          name: current-nodejs-16-run-image-hash-code
          path: hash-codes/build-nodejs-16/run.oci.sha256

    # - name: Upload nodejs 16 build image
    #   uses: actions/upload-artifact@v3
    #   with:
    #     name: current-nodejs-16-build-image
    #     path: build-nodejs-16/build.oci

  test:
    name: Acceptance Test
    needs: [create_stack]
    runs-on: ubuntu-22.04
    steps:
      - name: Setup Go
        uses: actions/setup-go@v3
        with:
          go-version: 1.20.x

      - name: Checkout
        uses: actions/checkout@v3

      - name: Create OCI artifacts destination directory
        run: |

      - name: Run Acceptance Tests
        # run: ./scripts/test.sh
        run: |
          echo "ommit for now, till acceptance tests pass."

  force_release_creation:
    name: Force Release Creation
    runs-on: ubuntu-22.04
    if: ${{github.event.inputs.force == 'true'}}
    steps:
      - name: Signal force release creation
        run: |
          echo "Force release creation input set to true"

  release:
    name: Release
    runs-on: ubuntu-22.04
    needs: [create_stack, test, force_release_creation]
    if: ${{ always() && needs.test.result == 'success' || needs.force_release_creation.result == 'success' }}
    steps:
      - name: Print Release Reasoning
        run: |
          printf "Acceptance Tests: %s\n" "${{ needs.test.result }}"
          printf "Force Release: %s\n" "${{ github.event.inputs.force }}"

      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0 # gets full history

      - name: Download nodejs-16 Run Image
        uses: actions/download-artifact@v3
        with:
          name: current-nodejs-16-run-image
          path: build-nodejs-16

      - name: Download nodejs-16 Run Image hash code
        uses: actions/download-artifact@v3
        with:
          name: current-nodejs-16-run-image-hash-code
          path: build-nodejs-16

      - name: Display structure of downloaded files
        run: ls -R

      - name: Increment Tag
        if: github.event.inputs.version == ''
        id: semver
        uses: paketo-buildpacks/github-config/actions/tag/increment-tag@main
        with:
          allow_head_tagged: true

      - name: Set Release Tag
        id: tag
        run: |
          tag="${{ github.event.inputs.version }}"
          if [ -z "${tag}" ]; then
            tag="${{ steps.semver.outputs.tag }}"
          fi
          echo "This is the tag ${tag}"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Get Repository Name
        id: repo_name
        run: |
          full=${{ github.repository }}
          # Strip off the org and slash from repo name
          # paketo-buildpacks/repo-name --> repo-name
          repo=$(echo "${full}" | sed 's/^.*\///')
          echo "this is the repo name ${repo}"
          echo "github_repo_name=${repo}" >> "$GITHUB_OUTPUT"

      - name: Create Release Notes
        id: notes
        # below commented out code is necessary to create the body of the release
        # the problem is that this implementation is different from what we need
        # so we might have to re implement it.
        # uses: paketo-buildpacks/github-config/actions/stack/release-notes@main
        # with:
        #   build_image: "paketobuildpacks/build-${{ steps.repo_name.outputs.registry_repo_name }}:${{ steps.tag.outputs.tag }}"
        #   run_image: "paketobuildpacks/run-${{ steps.repo_name.outputs.registry_repo_name }}:${{ steps.tag.outputs.tag }}"
        #   build_packages_added: ${{ needs.diff.outputs.build_added }}
        #   build_packages_modified: ${{ needs.diff.outputs.build_modified }}
        #   build_packages_removed_with_force: ${{ needs.diff.outputs.build_removed_with_force }}
        #   run_packages_added: ${{ needs.diff.outputs.run_added }}
        #   run_packages_modified: ${{ needs.diff.outputs.run_modified }}
        #   run_packages_removed_with_force: ${{ needs.diff.outputs.run_removed_with_force }}
        #   patched_usns: ${{ needs.poll_usns.outputs.usns }}
        run: |
          echo "not yet implemented"

      - name: Setup Release Assets
        id: assets
        run: |
          tree .
          assets="$(jq --null-input --compact-output \
            --arg tag "${{ steps.tag.outputs.tag }}" \
            --arg repo "${{ steps.repo_name.outputs.github_repo_name }}" \
            '[
              {
                "path": "build-nodejs-16/run.oci",
                "name": ($repo + "-" + $tag + "-" + "run-nodejs-16.oci"),
                "content_type": "application/gzip"
              },
              {
                "path": "build-nodejs-16/run.oci.sha256",
                "name": ($repo + "-" + $tag + "-" + "run-nodejs-16.oci.sha256"),
                "content_type": "application/gzip"
              }]')"

          echo $assets
          printf "assets=%s\n" "${assets}" >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: paketo-buildpacks/github-config/actions/release/create@main
        with:
          repo: ${{ github.repository }}
          token: ${{ secrets.PAKETO_BOT_GITHUB_TOKEN }}
          tag_name: v${{ steps.tag.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: v${{ steps.tag.outputs.tag }}
          body: ${{ steps.notes.outputs.release_body }}
          draft: false
          assets: ${{ steps.assets.outputs.assets }}

  failure:
    name: Alert on Failure
    runs-on: ubuntu-22.04
    needs: [create_stack, test, release]
    if: ${{ always() && needs.create_stack.result == 'failure' || needs.diff.result == 'failure' || needs.test.result == 'failure' || needs.release.result == 'failure' }}
    steps:
      - name: File Failure Alert Issue
        uses: paketo-buildpacks/github-config/actions/issue/file@main
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repo: ${{ github.repository }}
          label: "failure:release"
          comment_if_exists: true
          issue_title: "Failure: Create Release workflow"
          issue_body: |
            Create Release workflow [failed](https://github.com/${{github.repository}}/actions/runs/${{github.run_id}}).
            Please take a look to ensure CVE patches can be released. (cc @paketo-buildpacks/stacks-maintainers).
          comment_body: |
            Another failure occurred: https://github.com/${{github.repository}}/actions/runs/${{github.run_id}}
